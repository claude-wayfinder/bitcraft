<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: dark stone block -->
  <rect width="512" height="512" rx="32" fill="#1a1b24"/>
  <rect x="4" y="4" width="504" height="504" rx="28" fill="none" stroke="#2a2b36" stroke-width="4"/>

  <!-- Grid texture (subtle Minecraft stone) -->
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="none"/>
      <rect x="0" y="0" width="31" height="31" fill="none" stroke="#1e1f29" stroke-width="1"/>
    </pattern>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="16" fill="url(#grid)" opacity="0.5"/>

  <!-- Pixel "B" — each block is 32x32 -->
  <!-- Vertical bar -->
  <rect x="128" y="80"  width="32" height="32" fill="#22c55e"/>
  <rect x="128" y="112" width="32" height="32" fill="#22c55e"/>
  <rect x="128" y="144" width="32" height="32" fill="#1db954"/>
  <rect x="128" y="176" width="32" height="32" fill="#22c55e"/>
  <rect x="128" y="208" width="32" height="32" fill="#22c55e"/>
  <rect x="128" y="240" width="32" height="32" fill="#1db954"/>
  <rect x="128" y="272" width="32" height="32" fill="#22c55e"/>
  <rect x="128" y="304" width="32" height="32" fill="#22c55e"/>
  <rect x="128" y="336" width="32" height="32" fill="#1db954"/>
  <rect x="128" y="368" width="32" height="32" fill="#22c55e"/>
  <rect x="128" y="400" width="32" height="32" fill="#22c55e"/>

  <!-- Top horizontal -->
  <rect x="160" y="80" width="32" height="32" fill="#22c55e"/>
  <rect x="192" y="80" width="32" height="32" fill="#1db954"/>
  <rect x="224" y="80" width="32" height="32" fill="#22c55e"/>
  <rect x="256" y="80" width="32" height="32" fill="#22c55e"/>
  <rect x="288" y="80" width="32" height="32" fill="#1db954"/>

  <!-- Top-right curve -->
  <rect x="320" y="112" width="32" height="32" fill="#22c55e"/>
  <rect x="320" y="144" width="32" height="32" fill="#1db954"/>
  <rect x="320" y="176" width="32" height="32" fill="#22c55e"/>

  <!-- Middle horizontal -->
  <rect x="160" y="240" width="32" height="32" fill="#3b82f6"/>
  <rect x="192" y="240" width="32" height="32" fill="#2563eb"/>
  <rect x="224" y="240" width="32" height="32" fill="#3b82f6"/>
  <rect x="256" y="240" width="32" height="32" fill="#3b82f6"/>
  <rect x="288" y="240" width="32" height="32" fill="#2563eb"/>

  <!-- Middle-right return -->
  <rect x="288" y="208" width="32" height="32" fill="#22c55e"/>
  <rect x="256" y="208" width="32" height="32" fill="#1db954"/>

  <!-- Bottom-right curve -->
  <rect x="320" y="272" width="32" height="32" fill="#3b82f6"/>
  <rect x="352" y="304" width="32" height="32" fill="#3b82f6"/>
  <rect x="352" y="336" width="32" height="32" fill="#2563eb"/>
  <rect x="352" y="368" width="32" height="32" fill="#3b82f6"/>
  <rect x="320" y="400" width="32" height="32" fill="#3b82f6"/>

  <!-- Bottom horizontal -->
  <rect x="160" y="400" width="32" height="32" fill="#22c55e"/>
  <rect x="192" y="400" width="32" height="32" fill="#1db954"/>
  <rect x="224" y="400" width="32" height="32" fill="#22c55e"/>
  <rect x="256" y="400" width="32" height="32" fill="#22c55e"/>
  <rect x="288" y="400" width="32" height="32" fill="#1db954"/>

  <!-- Pickaxe accent — small, bottom right -->
  <rect x="384" y="416" width="8" height="8" fill="#f59e0b"/>
  <rect x="392" y="408" width="8" height="8" fill="#f59e0b"/>
  <rect x="400" y="400" width="8" height="8" fill="#9ca3af"/>
  <rect x="408" y="392" width="8" height="8" fill="#9ca3af"/>
  <rect x="416" y="384" width="8" height="8" fill="#9ca3af"/>
  <rect x="408" y="400" width="8" height="8" fill="#9ca3af"/>
  <rect x="416" y="392" width="8" height="8" fill="#6b7280"/>
  <rect x="400" y="408" width="8" height="8" fill="#6b7280"/>

  <!-- Block shine highlights -->
  <rect x="130" y="82"  width="8" height="4" fill="#4ade80" opacity="0.4"/>
  <rect x="130" y="242" width="8" height="4" fill="#60a5fa" opacity="0.4"/>
  <rect x="162" y="82"  width="8" height="4" fill="#4ade80" opacity="0.3"/>
  <rect x="226" y="82"  width="8" height="4" fill="#4ade80" opacity="0.3"/>
</svg>
